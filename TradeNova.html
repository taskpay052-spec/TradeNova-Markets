<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TradeNova - Professional Trading Platform</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e17;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #e8edf5;
            padding: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Top Bar */
        .top-bar {
            background: #0f1420;
            border: 1px solid #1e2a3a;
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 1.4rem;
            color: #2ecc71;
        }

        .logo p {
            font-size: 0.65rem;
            color: #7a8aa5;
        }

        /* Mode Toggle */
        .mode-switch {
            background: #080c16;
            border-radius: 40px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 36px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #9aabc4;
            border: none;
        }

        .mode-btn.active {
            background: #1e2a3e;
            color: #2ecc71;
        }

        /* Balance */
        .balance-card {
            background: #0a1020;
            padding: 8px 24px;
            border-radius: 40px;
            border-left: 3px solid #2ecc71;
        }

        .balance-label {
            font-size: 0.6rem;
            color: #8a9abb;
        }

        .balance-amount {
            font-size: 1.6rem;
            font-weight: 800;
        }

        /* Instrument Select */
        .instrument-box {
            background: #0f1420;
            border: 1px solid #25324a;
            border-radius: 40px;
            padding: 6px 12px;
        }

        .instrument-box select {
            background: #080c16;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 32px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Chart */
        .chart-wrapper {
            background: #060a12;
            border: 1px solid #1e2a3a;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
        }

        #chart {
            width: 100%;
            height: 450px;
        }

        /* Buy/Sell Buttons */
        .trade-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .btn-buy {
            flex: 1;
            background: #0a3b1f;
            color: #2ecc71;
            border: none;
            border-bottom: 4px solid #2ecc71;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 60px;
            cursor: pointer;
        }

        .btn-sell {
            flex: 1;
            background: #3b1a1a;
            color: #e74c3c;
            border: none;
            border-bottom: 4px solid #e74c3c;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 60px;
            cursor: pointer;
        }

        .btn-buy:active { transform: scale(0.97); }
        .btn-sell:active { transform: scale(0.97); }

        /* History */
        .history-panel {
            background: #0f1420;
            border: 1px solid #1e2a3a;
            border-radius: 20px;
            padding: 16px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #1e3048;
            padding-bottom: 10px;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 80px 70px 1fr 80px;
            background: #0a1020;
            margin: 6px 0;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            border-left: 3px solid;
        }

        .trade-row.buy { border-left-color: #2ecc71; }
        .trade-row.sell { border-left-color: #e74c3c; }
        .profit-positive { color: #2ecc71; }
        .profit-negative { color: #e74c3c; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .top-bar { flex-direction: column; }
            .trade-row { grid-template-columns: 65px 60px 1fr 65px; font-size: 0.65rem; }
            #chart { height: 350px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">
            <h1>⚡ TRADENOVA</h1>
            <p>Forex · Gold · Indices</p>
        </div>
        <div class="mode-switch" id="modeSwitch">
            <button class="mode-btn active" data-mode="demo">DEMO</button>
            <button class="mode-btn" data-mode="real">REAL (UI)</button>
        </div>
        <div class="balance-card">
            <div class="balance-label">BALANCE</div>
            <div class="balance-amount" id="balance">$10,000</div>
        </div>
        <div class="instrument-box">
            <select id="instrument">
                <option value="EUR/USD">EUR/USD</option>
                <option value="GBP/USD">GBP/USD</option>
                <option value="USD/JPY">USD/JPY</option>
                <option value="XAU/USD">XAU/USD (Gold)</option>
                <option value="XAG/USD">XAG/USD</option>
                <option value="AUD/USD">AUD/USD</option>
                <option value="USD/CAD">USD/CAD</option>
                <option value="US30">US30</option>
                <option value="NAS100">NAS100</option>
            </select>
        </div>
    </div>

    <!-- Chart -->
    <div class="chart-wrapper">
        <div id="chart"></div>
    </div>

    <!-- Buy/Sell -->
    <div class="trade-buttons">
        <button class="btn-buy" id="buyBtn">▲ BUY ▲</button>
        <button class="btn-sell" id="sellBtn">▼ SELL ▼</button>
    </div>

    <!-- History -->
    <div class="history-panel">
        <div class="history-header">
            <span>📋 TRADE HISTORY</span>
            <span>Pair / Side / Price / P&L</span>
        </div>
        <div class="history-list" id="history">
            <div style="text-align:center; color:#5a6e8a; padding:20px;">No trades yet</div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // TRADENOVA - WORKING VERSION
    // ============================================================
    
    console.log("TradeNova starting...");
    
    // State
    let balance = 10000;
    let mode = "demo";
    let trades = [];
    let currentInstrument = "EUR/USD";
    let currentPrice = 1.0850;
    
    // Chart variables
    let chart = null;
    let series = null;
    let candleData = [];
    let candleInterval = null;
    
    // Base prices for instruments
    const prices = {
        "EUR/USD": 1.0850, "GBP/USD": 1.2650, "USD/JPY": 149.20,
        "XAU/USD": 2350.50, "XAG/USD": 28.10, "AUD/USD": 0.6620,
        "USD/CAD": 1.3580, "US30": 39820, "NAS100": 18450
    };
    
    // Volatility
    function getVolatility(instr) {
        if (instr === "XAU/USD") return 3.5;
        if (instr === "US30" || instr === "NAS100") return 50;
        return 0.0025;
    }
    
    // Generate candles
    function generateCandles(instr, count = 40) {
        const candles = [];
        let base = prices[instr] || 1.0850;
        let time = Date.now() - (count * 60000);
        const vol = getVolatility(instr);
        
        for (let i = 0; i < count; i++) {
            const open = base;
            const close = open + (Math.random() - 0.5) * vol;
            const high = Math.max(open, close) + Math.random() * vol * 0.7;
            const low = Math.min(open, close) - Math.random() * vol * 0.7;
            candles.push({
                time: (time + i * 60000) / 1000,
                open: Number(open.toFixed(4)),
                high: Number(high.toFixed(4)),
                low: Number(low.toFixed(4)),
                close: Number(close.toFixed(4))
            });
            base = close;
        }
        currentPrice = candles[candles.length - 1].close;
        return candles;
    }
    
    // Add new candle
    function addNewCandle() {
        if (!series || !candleData.length) return;
        
        const last = candleData[candleData.length - 1];
        const vol = getVolatility(currentInstrument);
        const change = (Math.random() - 0.5) * vol;
        const open = last.close;
        let close = open + change;
        if (close <= 0) close = open + 0.001;
        
        const high = Math.max(open, close) + Math.random() * vol * 0.6;
        const low = Math.min(open, close) - Math.random() * vol * 0.6;
        
        const newCandle = {
            time: Date.now() / 1000,
            open: Number(open.toFixed(4)),
            high: Number(high.toFixed(4)),
            low: Number(low.toFixed(4)),
            close: Number(close.toFixed(4))
        };
        
        candleData.push(newCandle);
        if (candleData.length > 80) candleData.shift();
        series.setData(candleData);
        currentPrice = newCandle.close;
    }
    
    // Initialize chart
    function initChart() {
        const chartElement = document.getElementById('chart');
        if (!chartElement) {
            console.error("Chart element not found!");
            return false;
        }
        
        chart = LightweightCharts.createChart(chartElement, {
            layout: { background: { color: '#060a12' }, textColor: '#cbd5e6' },
            grid: { vertLines: { color: '#16202e' }, horzLines: { color: '#16202e' } },
            width: chartElement.clientWidth,
            height: 450,
        });
        
        series = chart.addCandlestickSeries({
            upColor: '#2ecc71',
            downColor: '#e74c3c',
            borderUpColor: '#2ecc71',
            borderDownColor: '#e74c3c',
            wickUpColor: '#2ecc71',
            wickDownColor: '#e74c3c',
        });
        
        candleData = generateCandles(currentInstrument, 45);
        series.setData(candleData);
        chart.timeScale().fitContent();
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartElement.clientWidth });
        });
        
        return true;
    }
    
    // Switch instrument
    function switchInstrument(instr) {
        currentInstrument = instr;
        candleData = generateCandles(currentInstrument, 45);
        if (series) {
            series.setData(candleData);
            chart.timeScale().fitContent();
        }
    }
    
    // Update balance display
    function updateBalanceUI() {
        document.getElementById('balance').innerHTML = `$${balance.toFixed(2)}`;
    }
    
    // Execute trade
    function executeTrade(side) {
        // Calculate P&L based on price movement simulation
        const vol = getVolatility(currentInstrument);
        let pnlPercent = (Math.random() - 0.4) * 1.2;
        if (side === "SELL") pnlPercent = -pnlPercent;
        
        let pnl = currentPrice * pnlPercent * 80;
        if (currentInstrument === "XAU/USD") pnl *= 1.5;
        if (currentInstrument === "US30") pnl *= 1.8;
        
        pnl = Math.min(pnl, 400);
        pnl = Math.max(pnl, -350);
        
        balance += pnl;
        if (balance < 0) balance = 0;
        updateBalanceUI();
        
        // Add to history
        trades.unshift({
            id: Date.now(),
            pair: currentInstrument,
            side: side,
            price: currentPrice,
            pnl: pnl,
            time: new Date().toLocaleTimeString()
        });
        
        // Update history display
        const historyDiv = document.getElementById('history');
        if (trades.length === 0) {
            historyDiv.innerHTML = '<div style="text-align:center; color:#5a6e8a; padding:20px;">No trades yet</div>';
        } else {
            historyDiv.innerHTML = trades.map(t => {
                const profitClass = t.pnl >= 0 ? 'profit-positive' : 'profit-negative';
                const sign = t.pnl >= 0 ? '+' : '';
                const sideClass = t.side === 'BUY' ? 'buy' : 'sell';
                return `
                    <div class="trade-row ${sideClass}">
                        <span>${t.pair}</span>
                        <span><strong>${t.side}</strong></span>
                        <span>$${t.price.toFixed(2)}</span>
                        <span class="${profitClass}">${sign}$${t.pnl.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
        }
        
        if (mode === "real") {
            alert("REAL MODE (UI Only) - Virtual trade executed");
        }
    }
    
    // Event listeners
    document.getElementById('buyBtn').addEventListener('click', () => executeTrade('BUY'));
    document.getElementById('sellBtn').addEventListener('click', () => executeTrade('SELL'));
    
    // Mode switch
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            mode = btn.getAttribute('data-mode');
        });
    });
    
    // Instrument change
    document.getElementById('instrument').addEventListener('change', (e) => {
        switchInstrument(e.target.value);
    });
    
    // Start everything
    function start() {
        const chartStarted = initChart();
        if (chartStarted) {
            candleInterval = setInterval(() => addNewCandle(), 4000);
            console.log("TradeNova running!");
        } else {
            document.getElementById('chart').innerHTML = '<div style="color:red; padding:20px;">Chart failed to load. Check internet connection.</div>';
        }
        updateBalanceUI();
    }
    
    start();
</script>
</body>
</html>
